! =========================================================================
! agg-01 — Cisco Cat8000v (IOS-XE)
! Role: Aggregation
! Router ID: 100.127.1.21
! AS: 4208675309
! Original: IP Infusion OcNOS SP
! =========================================================================
!
hostname agg-01
!
no ip domain-lookup
!
interface Loopback0
 description Loopback
 ip address 100.127.1.21 255.255.255.255
 ipv6 address 3fff:1ab:d127:d1::21/128
 ip router isis sa51
 ipv6 router isis sa51
!
interface GigabitEthernet1
 description MANAGEMENT
 ip address dhcp
 no shutdown
!
interface GigabitEthernet2
 description agg-01-to-twr-01
 mtu 9000
 ip address 100.126.50.1 255.255.255.248
 ipv6 address 3fff:1ab:d50:d0::1/64
 ip router isis sa51
 ipv6 router isis sa51
 no shutdown
!
interface GigabitEthernet3
 description agg-01-to-twr-02
 mtu 9000
 ip address 100.126.50.17 255.255.255.248
 ipv6 address 3fff:1ab:d50:d16::d17/64
 ip router isis sa51
 ipv6 router isis sa51
 no shutdown
!
interface GigabitEthernet4
 shutdown
!
interface GigabitEthernet5
 description agg-01-to-core-01
 mtu 9000
 ip address 100.126.1.50 255.255.255.248
 ipv6 address 3fff:1ab:d1:d48::50/64
 ip router isis sa51
 ipv6 router isis sa51
 no shutdown
!
interface GigabitEthernet6
 shutdown
!
! -------------------------------------------------------------------------
! IS-IS Underlay
! -------------------------------------------------------------------------
!
router isis sa51
 net 49.0051.1001.2700.1021.00
 is-type level-2-only
 metric-style wide
 address-family ipv6
  multi-topology
 exit-address-family
!
! -------------------------------------------------------------------------
! BGP — Peers to core-01 (RR)
! -------------------------------------------------------------------------
!
router bgp 4208675309
 bgp router-id 100.127.1.21
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! --- IPv4 peer group ---
 neighbor PG-IPv4-AS4208675309 peer-group
 neighbor PG-IPv4-AS4208675309 remote-as 4208675309
 neighbor PG-IPv4-AS4208675309 update-source Loopback0
 neighbor PG-IPv4-AS4208675309 timers 5 15
 !
 ! --- IPv6 peer group ---
 neighbor PG-IPv6-AS4208675309 peer-group
 neighbor PG-IPv6-AS4208675309 remote-as 4208675309
 neighbor PG-IPv6-AS4208675309 update-source Loopback0
 neighbor PG-IPv6-AS4208675309 timers 5 15
 !
 ! --- IPv4 neighbor to core-01 ---
 neighbor 100.127.1.1 peer-group PG-IPv4-AS4208675309
 !
 ! --- IPv6 neighbor to core-01 ---
 neighbor 3fff:1ab:d127:d1::1 peer-group PG-IPv6-AS4208675309
 !
 ! --- IPv4 unicast address family ---
 address-family ipv4 unicast
  neighbor PG-IPv4-AS4208675309 activate
  neighbor 100.127.1.1 activate
 exit-address-family
 !
 ! --- IPv6 unicast address family ---
 address-family ipv6 unicast
  neighbor PG-IPv6-AS4208675309 activate
  neighbor 3fff:1ab:d127:d1::1 activate
 exit-address-family
 !
 ! --- L2VPN EVPN address family ---
 address-family l2vpn evpn
  neighbor PG-IPv4-AS4208675309 activate
  neighbor PG-IPv6-AS4208675309 activate
  neighbor 100.127.1.1 activate
  neighbor 3fff:1ab:d127:d1::1 activate
 exit-address-family
!
end
