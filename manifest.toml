# =============================================================================
# Links — Point-to-Point Underlay Connections
# =============================================================================

# core-01 gig2 <-> agg-01 gig5
# IPv4: 100.126.1.49/29 <-> 100.126.1.50/29
# IPv6: 3fff:1ab:d1:d48::49/64 <-> 3fff:1ab:d1:d48::50/64
[[links]]
src = "core-01::gig2"
dst = "agg-01::gig5"

# agg-01 gig2 <-> twr-01 eth2
# IPv4: 100.126.50.1/29 <-> 100.126.50.2/29
# IPv6: 3fff:1ab:d50:d0::1/64 <-> 3fff:1ab:d50:d0::2/64
[[links]]
src = "agg-01::gig2"
dst = "twr-01::eth2"

# agg-01 gig3 <-> twr-02 eth2
# IPv4: 100.126.50.17/29 <-> 100.126.50.18/29
# IPv6: 3fff:1ab:d50:d16::d17/64 <-> 3fff:1ab:d50:d16::d18/64
[[links]]
src = "agg-01::gig3"
dst = "twr-02::eth2"

# twr-01 eth3 <-> twr-03 eth2
# IPv4: 100.126.50.9/29 <-> 100.126.50.10/29
# IPv6: 3fff:1ab:d50:d8::9/64 <-> 3fff:1ab:d50:d8::10/64
[[links]]
src = "twr-01::eth3"
dst = "twr-03::eth2"

# twr-02 eth3 <-> twr-03 eth3
# IPv4: 100.126.50.25/29 <-> 100.126.50.26/29
# IPv6: 3fff:1ab:d50:d24::d25/64 <-> 3fff:1ab:d50:d24::26/64
[[links]]
src = "twr-02::eth3"
dst = "twr-03::eth3"
