! =========================================================================
! core-01 — Cisco Cat8000v (IOS-XE)
! Role: BGP EVPN Route Reflector
! Router ID: 100.127.1.1
! AS: 4208675309
! Original: IP Infusion OcNOS SP
! =========================================================================
!
hostname core-01
!
no ip domain-lookup
!
interface Loopback0
 description Loopback
 ip address 100.127.1.1 255.255.255.255
 ipv6 address 3fff:1ab:d127:d1::1/128
 ip router isis sa51
 ipv6 router isis sa51
!
interface GigabitEthernet1
 description MANAGEMENT
 ip address 172.31.1.11 255.255.255.0
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 172.31.1.1
!
interface GigabitEthernet2
 description core-01-to-agg-01
 mtu 9000
 ip address 100.126.1.49 255.255.255.248
 ipv6 address 3fff:1ab:d1:d48::49/64
 ip router isis sa51
 ipv6 router isis sa51
 no shutdown
!
interface GigabitEthernet3
 shutdown
!
interface GigabitEthernet4
 shutdown
!
interface GigabitEthernet5
 shutdown
!
interface GigabitEthernet6
 shutdown
!
! -------------------------------------------------------------------------
! IS-IS Underlay
! -------------------------------------------------------------------------
!
router isis sa51
 net 49.0051.1001.2700.1001.00
 is-type level-2-only
 metric-style wide
 address-family ipv6
  no multi-topology
 exit-address-family
!
! -------------------------------------------------------------------------
! BGP — Route Reflector for all towers
! -------------------------------------------------------------------------
!
router bgp 4208675309
 bgp router-id 100.127.1.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! --- IPv4 peer group ---
 neighbor PG-IPv4-AS4208675309 peer-group
 neighbor PG-IPv4-AS4208675309 remote-as 4208675309
 neighbor PG-IPv4-AS4208675309 update-source Loopback0
 neighbor PG-IPv4-AS4208675309 timers 5 15
 !
 ! --- IPv6 peer group ---
 neighbor PG-IPv6-AS4208675309 peer-group
 neighbor PG-IPv6-AS4208675309 remote-as 4208675309
 neighbor PG-IPv6-AS4208675309 update-source Loopback0
 neighbor PG-IPv6-AS4208675309 timers 5 15
 !
 ! --- IPv4 neighbors (agg-01 + towers) ---
 neighbor 100.127.1.21 peer-group PG-IPv4-AS4208675309
 neighbor 100.127.50.101 peer-group PG-IPv4-AS4208675309
 neighbor 100.127.50.102 peer-group PG-IPv4-AS4208675309
 neighbor 100.127.50.103 peer-group PG-IPv4-AS4208675309
 !
 ! --- IPv6 neighbors (agg-01 + towers) ---
 neighbor 3fff:1ab:d127:d1::21 peer-group PG-IPv6-AS4208675309
 neighbor 3fff:1ab:d127:d50::101 peer-group PG-IPv6-AS4208675309
 neighbor 3fff:1ab:d127:d50::102 peer-group PG-IPv6-AS4208675309
 neighbor 3fff:1ab:d127:d50::103 peer-group PG-IPv6-AS4208675309
 !
 ! --- IPv4 unicast address family ---
 address-family ipv4 unicast
  neighbor PG-IPv4-AS4208675309 activate
  neighbor PG-IPv4-AS4208675309 route-reflector-client
  neighbor 100.127.1.21 activate
  neighbor 100.127.50.101 activate
  neighbor 100.127.50.102 activate
  neighbor 100.127.50.103 activate
 exit-address-family
 !
 ! --- IPv6 unicast address family ---
 address-family ipv6 unicast
  neighbor PG-IPv6-AS4208675309 activate
  neighbor PG-IPv6-AS4208675309 route-reflector-client
  neighbor 3fff:1ab:d127:d1::21 activate
  neighbor 3fff:1ab:d127:d50::101 activate
  neighbor 3fff:1ab:d127:d50::102 activate
  neighbor 3fff:1ab:d127:d50::103 activate
 exit-address-family
 !
 ! --- L2VPN EVPN address family ---
 address-family l2vpn evpn
  neighbor PG-IPv4-AS4208675309 activate
  neighbor PG-IPv4-AS4208675309 route-reflector-client
  neighbor PG-IPv6-AS4208675309 activate
  neighbor PG-IPv6-AS4208675309 route-reflector-client
  neighbor 100.127.1.21 activate
  neighbor 100.127.50.101 activate
  neighbor 100.127.50.102 activate
  neighbor 100.127.50.103 activate
  neighbor 3fff:1ab:d127:d1::21 activate
  neighbor 3fff:1ab:d127:d50::101 activate
  neighbor 3fff:1ab:d127:d50::102 activate
  neighbor 3fff:1ab:d127:d50::103 activate
 exit-address-family
!
end
